# Burrow 兔子洞 —— 配置文件
# 使用前请填写你的 API Key

# LLM 打标 API（用于自动提取关键词标签，可关闭）
tagger:
  enabled: true
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  api_key: "sk-your-deepseek-key"

# Embedding API（用于语义搜索，可关闭）
embedding:
  enabled: true
  model: "text-embedding-004"
  api_key: "your-gemini-api-key"

# 服务器（Streamable HTTP 模式，供 Rikkahub 连接）
server:
  transport: "streamable-http"  # streamable-http / sse / stdio
  host: "0.0.0.0"
  port: 8000

# 数据库
database:
  path: "./data/burrow.db"
